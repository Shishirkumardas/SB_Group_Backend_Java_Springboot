# Use Render's DATABASE_URL directly (it auto-maps to jdbc:postgresql://...)
spring.datasource.url=${DATABASE_URL}

# Explicitly set driver (already good, but keep it)
spring.datasource.driver-class-name=org.postgresql.Driver

# Optional but fixes "undefined/unknown" in many cases by telling Hibernate to use datasource URL
spring.jpa.properties.hibernate.connection.url=${spring.datasource.url}


